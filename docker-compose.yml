# 重庆黑客松项目开发环境
version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: hackthon-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: hackthon_core_dev
      MYSQL_USER: hackthon_user
      MYSQL_PASSWORD: hackthon_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database_design_hybrid.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - hackthon-network

  # Redis缓存
  redis:
    image: redis:7.0-alpine
    container_name: hackthon-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hackthon-network

  # RabbitMQ消息队列
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: hackthon-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /hackthon
    ports:
      - "5672:5672"
      - "15672:15672"  # 管理界面
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - hackthon-network

  # MinIO对象存储
  minio:
    image: minio/minio:latest
    container_name: hackthon-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"  # 控制台
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - hackthon-network

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: hackthon-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - hackthon-network

  # Grafana可视化
  grafana:
    image: grafana/grafana:latest
    container_name: hackthon-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - hackthon-network

  # 核心应用服务（开发时可选）
  app-core:
    build:
      context: ./stage1-core
      dockerfile: Dockerfile
    container_name: hackthon-app-core
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: mysql
      DB_USERNAME: hackthon_user
      DB_PASSWORD: hackthon_pass
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      MINIO_ENDPOINT: http://minio:9000
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - minio
    networks:
      - hackthon-network
    profiles:
      - app  # 使用 docker-compose --profile app up 启动

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  hackthon-network:
    driver: bridge