name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build APK with EAS (Local)
        working-directory: ./frontend
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npm install -g eas-cli

          # Initialize EAS project if not already initialized
          if [ ! -f eas.json ] || ! grep -q "projectId" eas.json; then
            eas init --id niaoleme-$(date +%s) --non-interactive || true
          fi

          eas build --platform android --local --non-interactive

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./frontend/**/*.apk
          body: |
            Niaoleme v${{ github.ref_name }}

            APK已构建完成，准备下载！

            ## 功能特性
            - 🤖 ChatAnywhere AI 健康分析
            - 🚻 社区厕所库
            - 📊 健康数据追踪
            - 💬 实时AI对话
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
