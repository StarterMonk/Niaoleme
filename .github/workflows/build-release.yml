name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build bundle with Expo
        working-directory: ./frontend
        run: |
          npm install -g expo-cli
          expo export --platform android --output-dir ./build

      - name: Create release artifacts
        run: |
          cd ./frontend/build
          # Create a compressed bundle package
          tar -czf ../niaoleme-bundle.tar.gz .
          ls -lh ../niaoleme-bundle.tar.gz

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./frontend/niaoleme-bundle.tar.gz
            ./frontend/app.json
          body: |
            Niaoleme v${{ github.ref_name }}

            ## 📦 Release Contents
            - `niaoleme-bundle.tar.gz` - Expo bundle for Android deployment
            - `app.json` - App configuration

            ## 🚀 Features
            - 🤖 ChatAnywhere AI 健康分析
            - 🚻 社区厕所库
            - 📊 健康数据追踪
            - 💬 实时AI对话

            ## 📱 Installation
            Extract the bundle and use `eas submit` or upload to Expo directly.

          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
