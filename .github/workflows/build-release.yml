name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build APK
        working-directory: ./frontend
        run: |
          cd android
          # Initialize Gradle wrapper if it doesn't exist
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.0
          fi
          chmod +x gradlew
          ./gradlew assembleRelease

          # Find and copy the built APK
          APK_PATH=$(find . -name "*release*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found"
            exit 1
          fi
          mkdir -p ../build
          cp "$APK_PATH" ../build/app-release.apk
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./frontend/build/app-release.apk
          body: |
            Niaoleme v${{ github.ref_name }}

            APK已构建完成，准备下载！

            ## 功能特性
            - 🤖 ChatAnywhere AI 健康分析
            - 🚻 社区厕所库
            - 📊 健康数据追踪
            - 💬 实时AI对话
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
