global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # 监控 Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 监控尿了么核心服务
  - job_name: 'niaolemo-core'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['niaolemo-core:8080']
    scrape_interval: 10s
    scrape_timeout: 5s

  # 监控 MySQL 数据库
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']

  # 监控 Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # 监控 Node Exporter (系统指标)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # 监控 Docker 容器
  - job_name: 'docker'
    static_configs:
      - targets: ['cadvisor:8080']