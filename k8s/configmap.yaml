apiVersion: v1
kind: ConfigMap
metadata:
  name: niaolemo-config
  namespace: niaolemo
data:
  application.yml: |
    server:
      port: 8080
    spring:
      profiles:
        active: prod
      datasource:
        url: jdbc:mysql://mysql-service:3306/niaolemo_core_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
      data:
        redis:
          host: redis-service
          port: 6379
          password: ${REDIS_PASSWORD}
    jwt:
      secret: ${JWT_SECRET}
    logging:
      level:
        com.niaolemo: INFO