apiVersion: apps/v1
kind: Deployment
metadata:
  name: niaolemo-core
  namespace: niaolemo
  labels:
    app: niaolemo-core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: niaolemo-core
  template:
    metadata:
      labels:
        app: niaolemo-core
    spec:
      containers:
      - name: niaolemo-core
        image: niaolemo/core:latest
        ports:
        - containerPort: 8080
        env:
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: niaolemo-secrets
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: niaolemo-secrets
              key: DB_PASSWORD
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: niaolemo-secrets
              key: REDIS_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: niaolemo-secrets
              key: JWT_SECRET
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: config-volume
        configMap:
          name: niaolemo-config